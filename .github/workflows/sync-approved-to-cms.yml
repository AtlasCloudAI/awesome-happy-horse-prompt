name: Sync Approved Submission

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: write

jobs:
  sync:
    if: |
      github.event.label.name == 'approved' &&
      contains(join(github.event.issue.labels.*.name, ' '), 'prompt-submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync issue to dataset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: npm run sync

      - name: Regenerate README files
        run: npm run generate

      - name: Commit synced content
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/prompts.json README*.md
          if git diff --quiet && git diff --staged --quiet; then
            echo "No synced changes to commit."
            exit 0
          fi
          git commit -m "chore: sync approved prompt #${{ github.event.issue.number }} [skip ci]"
          git push

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Your Happy Horse 1 prompt has been approved and synced into the repository. README files will reflect it automatically.'
            })
